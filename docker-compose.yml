name: eigenfield

services:
  eigenfield_ollama:
    image: ollama/ollama:0.13.5
    container_name: eigenfield_ollama
    ports:
      - "11434:11434"
    volumes:
      - eigenfield_ollama_data:/root/.ollama
      - ./backend/entrypoint.sh:/entrypoint.sh:ro
    entrypoint: ["/usr/bin/bash", "/entrypoint.sh"]
    environment:
      - OLLAMA_NUM_PARALLEL=2
      - OLLAMA_MAX_LOADED_MODELS=1
      - OLLAMA_FLASH_ATTENTION=1
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 3G
    networks:
      - eigenfield_network

  eigenfield_langfuse_db:
    image: postgres:16-alpine
    container_name: eigenfield_langfuse_db
    environment:
      - POSTGRES_DB=langfuse
      - POSTGRES_USER=langfuse
      - POSTGRES_PASSWORD=langfuse_secret
    volumes:
      - eigenfield_langfuse_db_data:/var/lib/postgresql/data
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - eigenfield_network

  eigenfield_langfuse:
    image: langfuse/langfuse:2
    container_name: eigenfield_langfuse
    ports:
      - "3100:3000"
    environment:
      - DATABASE_URL=postgresql://langfuse:langfuse_secret@eigenfield_langfuse_db:5432/langfuse
      - NEXTAUTH_SECRET=eigenfield-local-secret-change-me
      - NEXTAUTH_URL=http://localhost:3100
      - SALT=eigenfield-local-salt-change-me
      - TELEMETRY_ENABLED=false
      - LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES=false
    depends_on:
      - eigenfield_langfuse_db
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - eigenfield_network

  eigenfield_backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: eigenfield_backend
    ports:
      - "9000:9000"
    volumes:
      - ./backend/app:/opt/eigen_field/app:cached
      - ./backend/data:/opt/eigen_field/data
      - ./backend/vectordb:/opt/eigen_field/vectordb
      - eigenfield_pip_cache:/root/.cache/pip
    env_file:
      - ./backend/.env
    restart: unless-stopped
    depends_on:
      - eigenfield_ollama
      - eigenfield_langfuse
    deploy:
      resources:
        limits:
          memory: 4G
    networks:
      - eigenfield_network

  eigenfield_frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: eigenfield_frontend
    ports:
      - "3039:3039"
    volumes:
      - ./frontend/src:/app/src:cached
      - ./frontend/public:/app/public:cached
      - ./frontend/index.html:/app/index.html:ro
      - ./frontend/vite.config.ts:/app/vite.config.ts:ro
      - ./frontend/tsconfig.json:/app/tsconfig.json:ro
      - eigenfield_node_modules:/app/node_modules
    environment:
      - VITE_API_URL=http://localhost:9000
      - CHOKIDAR_USEPOLLING=true
      - NODE_OPTIONS=--max-old-space-size=1024
    depends_on:
      - eigenfield_backend
    deploy:
      resources:
        limits:
          memory: 2G
    networks:
      - eigenfield_network
    restart: unless-stopped

volumes:
  eigenfield_ollama_data:
    name: eigenfield_ollama_data
  eigenfield_pip_cache:
    name: eigenfield_pip_cache
  eigenfield_node_modules:
    name: eigenfield_node_modules
  eigenfield_langfuse_db_data:
    name: eigenfield_langfuse_db_data

networks:
  eigenfield_network:
    name: eigenfield_network
    driver: bridge